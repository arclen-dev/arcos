# ══════════════════════════════════════════════════════════════════
# HYPRLOCK CONFIG — v0.9.2
# 1440x900 — blurred wallpaper, vertical split clock, Orbitron
# ══════════════════════════════════════════════════════════════════

general {
    hide_cursor      = true
    ignore_empty_input = true
}

# ── Background — blurred current wallpaper ────────────────────────
background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.6
    contrast    = 1.0
    vibrancy    = 0.2
}

# ── Hour — top, wallust color4 ────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%I')"
    color       = rgba(83, 103, 84, 0.95)
    font_size   = 120
    font_family = Orbitron Bold
    position    = 0, 100
    halign      = center
    valign      = center
}

# ── Minutes — bottom, wallust color5 ─────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%M')"
    color       = rgba(91, 127, 22, 0.95)
    font_size   = 120
    font_family = Orbitron Bold
    position    = 0, -40
    halign      = center
    valign      = center
}

# ── AM/PM — small, floated right of center ────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%p')"
    color       = rgba(255, 255, 255, 0.35)
    font_size   = 18
    font_family = Orbitron
    position    = 160, 30
    halign      = center
    valign      = center
}

# ── Date — subtle, below the clock ───────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color       = rgba(255, 255, 255, 0.35)
    font_size   = 15
    font_family = Inter
    position    = 0, -155
    halign      = center
    valign      = center
}

# ── Password input ────────────────────────────────────────────────
input-field {
    monitor           =
    size              = 280, 48
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.20
    dots_center       = true
    dots_rounding     = -1

    outer_color       = rgba(255, 255, 255, 0.10)
    inner_color       = rgba(29, 27, 24, 0.80)
    font_color        = rgba(255, 255, 255, 0.90)
    fade_on_empty     = true
    fade_timeout      = 1000
    placeholder_text  = <span foreground="##ffffff66">󰌾  Enter Password</span>

    check_color       = rgba(83, 103, 84, 0.90)
    fail_color        = rgba(180, 60, 60, 0.90)
    fail_text         = <span foreground="##ff6e6e">  Wrong password</span>

    rounding          = 12
    position          = 0, -230
    halign            = center
    valign            = center
}
