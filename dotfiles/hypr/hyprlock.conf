# ══════════════════════════════════════════════════════════════════
# HYPRLOCK CONFIG
# Static parts live here. Dynamic layout (clock, input-field sizes
# and positions) is generated by hyprlock-gen.sh at startup and
# sourced from ~/.cache/arcos/hyprlock-dynamic.conf.
# To manually regenerate: ~/.config/hypr/scripts/hyprlock-gen.sh
# ══════════════════════════════════════════════════════════════════

general {
    hide_cursor        = true
    ignore_empty_input = true
}

# ── Background — blurred current wallpaper ────────────────────────
background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.6
    contrast    = 1.0
    vibrancy    = 0.2
}

# ── Dynamic layout (resolution-scaled, auto-generated) ────────────
source = ~/.cache/arcos/hyprlock-dynamic.conf
