###################
### KEYBINDINGS ###
###################

$mainMod    = SUPER
$terminal   = kitty
$fileManager = nemo
$menu       = rofi -show drun -theme ~/.config/rofi/themes/launcher.rasi
$powermenu  = ~/.config/hypr/scripts/powermenu.sh

# ─── Applications ────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       Space,  exec, $menu
bind = $mainMod,       B,      exec, brave

# ─── System ──────────────────────────────────────────────────────────
bind = $mainMod,       Q,      killactive
bind = $mainMod,       X,      exec, $powermenu
bind = $mainMod,       L,      exec, hyprlock
bind = $mainMod,       R,      exec, ~/.config/waybar/launch.sh
bind = $mainMod,       V,      togglefloating

# ─── Wallpaper & Theme ───────────────────────────────────────────────
bind = $mainMod,       W,      exec, ~/.config/hypr/scripts/wallpaper-select.sh
bind = $mainMod SHIFT, W,      exec, ~/.config/hypr/scripts/toggle-mode.sh

# ─── Layout (Dwindle) ────────────────────────────────────────────────
bind = $mainMod,       P,      pseudo
bind = $mainMod,       J,      layoutmsg, togglesplit

# ─── Clipboard & Emoji ───────────────────────────────────────────────
bind = $mainMod, C, exec, cliphist list | rofi -dmenu -p "󰅇  Clipboard" -theme ~/.config/rofi/themes/launcher.rasi | cliphist decode | wl-copy
bind = $mainMod, period, exec, rofimoji --action copy --skin-tone neutral --hidden-descriptions --selector-args="-theme ~/.config/rofi/themes/launcher.rasi -p 󰞅 -theme-str 'window { width: 520px; } listview { columns: 8; lines: 5; spacing: 2px; } element { padding: 22px 8px; } element-icon { enabled: false; } element-text { font: \"Noto Color Emoji 18\"; vertical-align: 0.5; horizontal-align: 0.5; }'"

# ─── Screenshots ─────────────────────────────────────────────────────
bind = ,               PRINT,       exec, hyprshot -m region
bind = SHIFT,          PRINT,       exec, hyprshot -m window
bind = $mainMod SHIFT, PRINT,       exec, hyprshot -m output

# ─── Notification Center ─────────────────────────────────────────────
bind = $mainMod,       N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, N, exec, swaync-client -d -sw  # toggle Do Not Disturb

# ─── Focus ───────────────────────────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ─── Workspaces (Direct) ─────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ─── Workspaces (Navigate with Arrow — Windows style) ────────────────
bind = $mainMod CTRL,  left,  workspace, r-1
bind = $mainMod CTRL,  right, workspace, r+1
bind = $mainMod CTRL,  up,    workspace, r-1
bind = $mainMod CTRL,  down,  workspace, r+1

# ─── Workspaces (Scroll) ─────────────────────────────────────────────
bind = $mainMod, mouse_down, workspace, r+1
bind = $mainMod, mouse_up,   workspace, r-1

# ─── Move Window to Workspace (Direct) ───────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ─── Move Window to Workspace (Arrow — Windows style) ────────────────
bind = $mainMod SHIFT, left,  movetoworkspace, r-1
bind = $mainMod SHIFT, right, movetoworkspace, r+1
bind = $mainMod SHIFT, up,    movetoworkspace, r-1
bind = $mainMod SHIFT, down,  movetoworkspace, r+1

# ─── Special Workspace (Scratchpad) ──────────────────────────────────
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ─── Mouse: Move & Resize ────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Volume ──────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,     exec, swayosd-client --input-volume mute-toggle

# ─── Brightness ──────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ─── Media ───────────────────────────────────────────────────────────
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
