# ══════════════════════════════════════════════════════════════════
# HYPRIDLE CONFIG
# Idle management — dims, locks, then suspends on inactivity
# ══════════════════════════════════════════════════════════════════

general {
    lock_cmd         = pidof hyprlock || hyprlock    # don't spawn if already locked
    before_sleep_cmd = loginctl lock-session          # lock before sleep
    after_sleep_cmd  = hyprctl dispatch dpms on       # wake screen after resume
    ignore_dbus_inhibit = false
}

# ── Dim screen after 4 min ────────────────────────────────────────
listener {
    timeout  = 240
    on-timeout  = brightnessctl -s set 20%   # save + dim to 20%
    on-resume   = brightnessctl -r            # restore saved brightness
}

# ── Lock screen after 6 min ───────────────────────────────────────
listener {
    timeout  = 360
    on-timeout  = loginctl lock-session
}

# ── Turn off display after 7 min ─────────────────────────────────
listener {
    timeout  = 420
    on-timeout  = hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on
}

# ── Suspend after 20 min ─────────────────────────────────────────
listener {
    timeout  = 1200
    on-timeout  = systemctl suspend
}
